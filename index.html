<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Through Infinity</title>
    <style>
        /* Reset i blokada przewijania */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Tło strony - Twoja tapeta */
        .background-wrapper {
            background-image: url('cosmos.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* Napis na górze */
        }

        /* Stylizacja napisów */
        .content {
            padding: 60px; /* Odstęp od krawędzi */
            color: white;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5); /* Cień dla lepszej czytelności */
        }

        h1 {
            font-size: clamp(2rem, 8vw, 4rem); /* Elastyczny rozmiar czcionki */
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 700;
        }

        p {
            font-size: clamp(1rem, 3vw, 1.5rem);
            margin: 10px 0 0 0;
            opacity: 0.9;
            font-weight: 300;
        }
    </style>
</head>
<body>

    <div class="background-wrapper">
        <div class="content">
            <h1>TOP-IDEOLOGICAL-STATE</h1>
            <p>Through infinity</p>
        </div>
    </div>

</body>
</html>
